<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ nombre_colegio }}</title>
  <style>
    body { margin: 0; padding: 0; background-color: #f4f6f9; font-family: Arial, Helvetica, sans-serif; color: #333333; }
    .wrapper { width: 100%; background-color: #f4f6f9; padding: 32px 16px; box-sizing: border-box; }
    .container { max-width: 580px; margin: 0 auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .header { background-color: {{ color_primario }}; padding: 28px 32px; text-align: center; }
    .header h1 { margin: 0; color: #ffffff; font-size: 22px; font-weight: 700; letter-spacing: 0.5px; }
    .header p { margin: 6px 0 0; color: rgba(255,255,255,0.85); font-size: 13px; }
    .body { padding: 32px; }
    .footer { background-color: #f4f6f9; padding: 20px 32px; text-align: center; border-top: 1px solid #e8eaed; }
    .footer p { margin: 0; font-size: 12px; color: #888888; line-height: 1.6; }
    .btn { display: inline-block; padding: 13px 28px; background-color: {{ color_primario }}; color: #ffffff !important; text-decoration: none; border-radius: 6px; font-weight: 700; font-size: 15px; margin-top: 20px; }
    .alert { border-radius: 6px; padding: 14px 18px; margin: 20px 0; font-size: 14px; }
    .alert-yellow { background-color: #fffbeb; border-left: 4px solid #f59e0b; color: #92400e; }
    .alert-red    { background-color: #fef2f2; border-left: 4px solid #ef4444; color: #991b1b; }
    .alert-green  { background-color: #f0fdf4; border-left: 4px solid #22c55e; color: #166534; }
    .alert-blue   { background-color: #eff6ff; border-left: 4px solid #3b82f6; color: #1e40af; }
    table.data { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 14px; }
    table.data th { background-color: #f8fafc; text-align: left; padding: 10px 14px; font-weight: 600; color: #555; border-bottom: 2px solid #e2e8f0; }
    table.data td { padding: 10px 14px; border-bottom: 1px solid #f1f5f9; }
    .monto { font-size: 32px; font-weight: 700; color: {{ color_primario }}; text-align: center; margin: 24px 0 8px; }
    .monto-label { text-align: center; font-size: 13px; color: #888; margin: 0 0 20px; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="container">
      <div class="header">
        <h1>{{ nombre_colegio }}</h1>
        <p>Portal de Representantes</p>
      </div>
      <div class="body">
        {% block content %}{% endblock %}
      </div>
      <div class="footer">
        <p>Este es un mensaje automatico de <strong>{{ nombre_colegio }}</strong>.<br>
        Si tiene alguna duda, comuniquese con la administracion del plantel.<br>
        Por favor no responda directamente a este correo.</p>
      </div>
    </div>
  </div>
</body>
</html>
